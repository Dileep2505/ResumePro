<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResumePro - Redirecting</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 24px;
      max-width: 680px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }
    h1 { margin: 0 0 10px; font-size: 24px; }
    p { margin: 8px 0; line-height: 1.5; }
    a { color: #0b63f6; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .small { color: #6b7280; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Redirecting to the correct page...</h1>
    <p>If this page does not redirect automatically, use one of these links:</p>
    <p><a href="/">Open Dashboard</a></p>
    <p><a href="/resume%20analyzer.html">Open Resume Analyzer</a></p>
    <p class="small" id="pathInfo"></p>
  </div>

  <script>
    (function () {
      var path = window.location.pathname || "/";
      var query = window.location.search || "";
      var hash = window.location.hash || "";
      var target = path;

      // GitHub Pages for this project is deployed from frontend/webapp root.
      // Strip accidental repo-style prefix from URLs like /frontend/webapp/... .
      if (path.indexOf("/frontend/webapp/") === 0) {
        target = path.replace("/frontend/webapp", "");
      } else if (path === "/frontend/webapp") {
        target = "/";
      }

      // If nothing changed, send users to app root.
      if (target === path) {
        target = "/";
      }

      document.getElementById("pathInfo").textContent = "Requested: " + path + "  ->  Redirecting: " + target;

      window.location.replace(target + query + hash);
    })();
  </script>
</body>
</html>
